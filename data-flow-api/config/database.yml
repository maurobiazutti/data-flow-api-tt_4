# PostgreSQL. Versions 9.5 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/opt/homebrew/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV["DATABASE_PG_USERNAME"] %>
  password: <%= ENV["DATABASE_PG_PASSWORD"] %>
  host: localhost
  port: 5432
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: data_flow_api_development
  #username: data_flow_api
  #password:
  #host: localhost
  #port: 5432

test:
  <<: *default
  database: data_flow_api_test

production:
  primary: &primary_production
    <<: *default
    database: data_flow_api_production
    username: data_flow_api
    password: <%= ENV["DATA_FLOW_API_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: data_flow_api_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: data_flow_api_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: data_flow_api_production_cable
    migrations_paths: db/cable_migrate
